- name: create ec2 instance and r53 records
  hosts: all
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0ccb89d519af9a73c
    domain_name: pmpkdev.online
    env: dev
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
  
  - name: print ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
  
  - name: create route 53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record:  "{{ item.item}}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: false  
    loop: "{{ ec2_output.results  }}"

  - name: create route 53 records for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record:  "roboshop-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: false   # wait until the changes have been replicated to all amazon route 53 dns servers. default(false) 
      overwrite: true
    loop: "{{ ec2_output.results  }}"
    when: item.item == "frontend"
  
  - name: delete route53 records for frontend
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when:
    - item == frontend
    - action == destroy

  - name: delete route53 records 
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: action == destroy