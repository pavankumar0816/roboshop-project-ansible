# ansible-playbook -i localhost, -e "instances=['mongodb', 'catalogue', 'user', 'cart', 'redis', 'shipping', 'mysql', 'rabbitmq',
# 'payment',  'frontend']" roboshop.yaml


- name: create ec2 instance and r53 records
  hosts: all
  # connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-01305469d3d08d74a
    domain_name: pmpkdev.online
    env: dev
    ACTION: create
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: ACTION == "create"
  
  - name: print ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: ACTION == "create"
  
  - name: create route 53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record:  "{{ item.item}}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: false  
    loop: "{{ ec2_output.results  }}"
    when: ACTION == "create"

  - name: create route 53 records for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record:  "roboshop-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: false   # wait until the changes have been replicated to all amazon route 53 dns servers. default(false) 
      overwrite: true
    loop: "{{ ec2_output.results  }}"
    when: 
    - item.item == "frontend"
    - ACTION == "create"

  - name: delete route53 records 
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: ACTION == "destroy"

  - name: delete ec2 instances
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
      wait: false
    loop: "{{ instances }}"
    when: ACTION == "destroy"